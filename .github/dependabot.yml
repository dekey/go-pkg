version: 2
updates:
  - package-ecosystem: gomod
    directory: "./"
    schedule:
      interval: daily
      time: "04:00"
    commit-message:
      prefix: "chore: bot"
      include: "scope"
    open-pull-requests-limit: 2

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
      time: "04:00"
    commit-message:
      prefix: "chore: bot"
      include: "scope"
    open-pull-requests-limit: 2
