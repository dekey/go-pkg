pull_request_rules:

  - name: automatic merge for Dependabot pull requests
    conditions:
      - author~=^dependabot(|-preview)\[bot\]$
      - base=main
    actions:
      merge:
        method: squash

  - name: autoupdate ready-to-merge prs
    conditions:
      - -conflict
      - -draft
      - label=ready-to-merge
    actions:
      update:

  - name: automatic merge for prs with ready-to-merge tag
    conditions:
      - label=ready-to-merge
      - base=main
    actions:
      merge:
        method: squash

  - name: delete head branch after merge
    conditions:
      - merged
    actions:
      delete_head_branch: {}
